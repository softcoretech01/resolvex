<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Module Type Master</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* --- TICKET SYSTEM DESIGN APPLIED --- */

/* CSS STYLES */
body{margin:0;font-family:Segoe UI, sans-serif;background:#fff}
.page{padding:14px}

/* HEADER */
.title-bar{background:#d6ece8;padding:8px 14px;border-radius:10px;display:flex;justify-content:space-between;align-items:center}
.title-bar h2{margin:0;font-size:18px;color:#063b52}
.new-btn{background:#ffb199;border:none;padding:6px 14px;border-radius:8px;font-size:14px;cursor:pointer}

/* SEARCH & TABLE */
.search-row{display:flex;justify-content:flex-end;margin:8px 0 10px}
.search-row input{padding:6px 12px;width:300px;font-size:14px;border:1px solid #ccc;border-radius:8px}

table{width:100%;border-collapse:collapse;font-size:14px}
thead tr{background:#b6e4e5}
th,td{padding:8px 12px;border:1px solid #e0e0e0}
tbody tr:nth-child(even){background:#fafafa}

/* Actions Styling */
.actions i{margin-right:8px;cursor:pointer}
.edit{color:#2c7be5}
.delete{color:#e63946}

/* MODAL COMMON */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);justify-content:center;align-items:center;z-index:1000}
.modal-content{
  background:#fff;
  width:500px; /* Compact width for Module Types */
  padding:20px 25px;
  border-radius:14px;
  max-height:90vh;
  overflow-y:auto;
}

/* FORM GRID */
.form-grid{
  display:grid;
  grid-template-columns: 1fr; /* Single column for simple form */
  gap: 15px;
}

label{font-weight:600;font-size:12px;display:block;margin-bottom:3px;color:#444}
input,select,textarea{
  width:100%;
  padding:6px 8px;
  font-size:13px;
  border:1px solid #ccc;
  border-radius:6px;
  height:36px;
  box-sizing:border-box;
}
textarea{
  height:auto;
  min-height:60px;
  resize:vertical;
  font-family: Segoe UI, sans-serif;
}

/* BUTTONS */
.modal-footer{display:flex;justify-content:flex-end;margin-top:20px;gap:12px}
.btn-cancel{background:#9e9e9e;color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer}
.btn-save{background:#1aaa8b;color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer}

</style>
</head>

<body>

<div class="page">
  <div class="title-bar">
    <h2>Module Type Master</h2>
    <button class="new-btn" id="btnOpenCreate">+ New</button>
  </div>

  <div class="search-row">
    <input id="searchBox" placeholder="Search module types..." onkeyup="filterTable()">
  </div>

  <table>
    <thead>
      <tr>
        <th>Code</th>
        <th>Name</th>
        <th>Description</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="modal" id="createModal">
  <div class="modal-content">
    <h3 id="modalTitle" style="text-align:center; margin-top:0">Add Module Type</h3>

    <div class="form-grid">
      <div>
        <label>Module Type Name *</label>
        <input type="text" id="typeName" placeholder="Enter name">
      </div>

      <div>
        <label>Description</label>
        <textarea id="typeDesc" placeholder="Enter description (optional)"></textarea>
      </div>

      <div>
        <label>Status</label>
        <select id="typeStatus">
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="document.getElementById('createModal').style.display='none'">Cancel</button>
      <button class="btn-save" onclick="saveModuleType()">Save</button>
    </div>
  </div>
</div>

<script>
// --- CONFIGURATION ---
const API_BASE = "/api/module-type"; // Adjust if your API prefix is different

// --- GLOBAL STATE ---
let moduleTypesList = [];
let editingCode = null;

// --- DOM ELEMENTS ---
const tbody = document.getElementById("tbody");
const createModal = document.getElementById("createModal");
const modalTitle = document.getElementById("modalTitle");

// Form Inputs
const elName = document.getElementById("typeName");
const elDesc = document.getElementById("typeDesc");
const elStatus = document.getElementById("typeStatus");

// --- INITIALIZATION ---
window.onload = function() {
  loadModuleTypes();
  document.getElementById("btnOpenCreate").addEventListener("click", openCreateModal);
};

/* ================= API CALLS ================= */

async function loadModuleTypes(){
  try {
    const res = await fetch(API_BASE); // Make sure your API handles a GET on this base URL
    if(!res.ok) throw new Error("Failed");
    moduleTypesList = await res.json();
    renderTable(moduleTypesList);
  } catch(e) {
    console.error(e);
    tbody.innerHTML = `<tr><td colspan="5" style="color:red;text-align:center">Error loading data.</td></tr>`;
  }
}

async function saveModuleType() {
  const data = {
    module_type_name: elName.value.trim(),
    description: elDesc.value.trim(),
    status: elStatus.value
  };

  if (!data.module_type_name) {
    alert("Module Type Name is required (*)");
    return;
  }

  const url = editingCode ? `${API_BASE}/${editingCode}` : API_BASE;
  const method = editingCode ? "PUT" : "POST";

  try {
    const res = await fetch(url, {
      method: method,
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });
    
    const result = await res.json();
    if (!res.ok) throw new Error(result.detail || result.message || "Save Failed");

    alert(result.message || "Saved successfully");
    createModal.style.display = "none";
    loadModuleTypes(); 
  } catch(e) {
    console.error(e);
    alert("Error: " + e.message);
  }
}

async function deleteModuleType(code){
  if(!confirm(`Are you sure you want to delete ${code}?`)) return;
  try {
    const res = await fetch(`${API_BASE}/${code}`, { method: "DELETE" });
    const result = await res.json();
    if(res.ok) {
        alert(result.message || "Deleted");
        loadModuleTypes();
    } else {
        alert(result.message || "Deletion failed");
    }
  } catch(e){ console.error(e); }
}

/* ================= EDIT & UI ================= */

function openCreateModal(){
  editingCode = null;
  modalTitle.innerText = "Add Module Type";

  // Reset Form
  elName.value = "";
  elDesc.value = "";
  elStatus.value = "Active";
  
  createModal.style.display = "flex";
}

function editModuleType(code) {
  const item = moduleTypesList.find(x => x.module_type_code === code);
  if (!item) return;

  editingCode = code;
  modalTitle.innerText = "Edit Module Type";

  // Populate Form
  elName.value = item.module_type_name || "";
  elDesc.value = item.description || "";
  
  // Handle Status normalization
  const s = item.status;
  elStatus.value = (s === "1" || s === 1 || s === "Active") ? "Active" : "Inactive";

  createModal.style.display = "flex";
}

function renderTable(data){
  tbody.innerHTML = "";
  data.forEach((item) => {
    // Determine status label for display
    const statusLabel = (item.status === 1 || item.status === '1' || item.status === 'Active') ? "Active" : "Inactive";

    tbody.innerHTML += `
      <tr>
        <td>${item.module_type_code}</td>
        <td>${item.module_type_name}</td>
        <td>${item.description || '-'}</td>
        <td>${statusLabel}</td>
        <td class="actions">
          <i class="fa fa-pen edit" onclick="editModuleType('${item.module_type_code}')"></i>
          <i class="fa fa-times delete" onclick="deleteModuleType('${item.module_type_code}')"></i>
        </td>
      </tr>`;
  });
}

function filterTable(){
  const term = document.getElementById("searchBox").value.toLowerCase();
  
  const filtered = moduleTypesList.filter(item => {
    const combinedData = [
      item.module_type_code,
      item.module_type_name,
      item.description,
      item.status
    ].map(val => val ? val.toString().toLowerCase() : "").join(" ");

    return combinedData.includes(term);
  });
  
  renderTable(filtered);
}
</script>

</body>
</html>
