<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Users Assignment</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  background-color: #fdfcfb;
  margin: 0;
  padding: 20px;
}

/* HEADER */
header {
  background-color: #cce3de;
  color: #1d3557;
  padding: 12px 22px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-radius: 10px;
  font-size: 20px;
  font-weight: bold;
}

header button {
  background-color: #ffb5a7;
  color: #333;
  border: none;
  border-radius: 8px;
  padding: 6px 14px;
  cursor: pointer;
  transition: 0.3s;
}
header button:hover { background-color: #fcd5ce; }

/* CONTAINER */
.container {
  margin-top: 18px;
}

/* SEARCH */
.search-bar {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 8px;
}
.search-bar input {
  padding: 7px 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
  width: 280px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  border: 1px solid #1d3557;
  border-radius: 8px;
  background-color: #fff;
}

th, td {
  text-align: left;
  padding: 8px 12px;
  border: 1px solid #ccc;
  font-size: 14px;
}

th {
  background-color: #a8dadc;
  cursor: pointer;
  color: #1d3557;
}

tr:nth-child(even) { background-color: #f8f9fa; }

/* ACTIONS */
.actions i {
  cursor: pointer;
  margin-right: 10px;
  font-size: 17px;
}
.fa-edit { color: #457b9d; }
.fa-times { color: #e63946; }

/* MODAL */
.modal {
  display: none;
  position: fixed;
  z-index: 10;
  left: 0; top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.3);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background-color: #fefefe;
  padding: 22px 26px;
  border-radius: 12px;
  width: 520px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.2);
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-header h3 {
  margin: 0;
  color: #1d3557;
}

.close {
  font-size: 22px;
  cursor: pointer;
  color: #888;
}

.form-group {
  margin-top: 12px;
}

.form-group label {
  font-weight: 600;
  display: block;
  margin-bottom: 5px;
  color: #333;
}

.form-group input,
.form-group select {
  width: 100%;
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.radio-group {
  display: flex;
  gap: 15px;
  margin-top: 5px;
}

.form-actions {
  text-align: right;
  margin-top: 18px;
}

.form-actions button {
  padding: 7px 16px;
  border: none;
  border-radius: 8px;
  margin-left: 10px;
  cursor: pointer;
  color: #333;
  font-weight: 500;
  transition: 0.3s;
}

.btn-save { background-color: #cce3de; }
.btn-cancel { background-color: #ffe5d9; }

.btn-save:hover { background-color: #d4f0e4; }
.btn-cancel:hover { background-color: #fff0eb; }
</style>
</head>

<body>

<header>
  <span>Project User Assignments</span>
  <button id="openModalBtn"><i class="fa fa-plus"></i> New Assignment</button>
</header>

<div class="container">

  <div class="search-bar">
    <input type="text" id="searchBox" placeholder="Search User or Project...">
  </div>

  <table id="userTable">
    <thead>
      <tr>
        <th>Project Name</th>
        <th>User Name</th>
        <th>Email (ID)</th>
        <th>Assigned Modules</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<div id="myModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">Assign User to Project</h3>
      <span class="close" id="closeModalBtn">&times;</span>
    </div>

    <div class="form-group">
      <label>Project</label>
      <select id="project_code"></select>
    </div>

    <div class="form-group">
      <label>Select User</label>
      <select id="user_id"></select>
    </div>

    <div class="form-group">
      <label>Module</label>
      <select id="module_code"></select>
    </div>

    <div class="form-group">
      <label>Status</label>
      <div class="radio-group">
        <label><input type="radio" name="status" value="Active" checked> Active</label>
        <label><input type="radio" name="status" value="Inactive"> Inactive</label>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-cancel" id="cancelBtn">Cancel</button>
      <button class="btn-save" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<script>
// !!! IMPORTANT: CHANGE THIS IF YOUR ROUTER PREFIX IS DIFFERENT !!!
const API_BASE = "/api/project-users"; 

let editId = null;
const modal = document.getElementById("myModal");
const modalTitle = document.getElementById("modalTitle");

/* OPEN MODAL FOR ADD */
openModalBtn.onclick = async () => {
  editId = null;
  modal.style.display = "flex";
  modalTitle.innerText = "Assign User to Project";
  
  // Clear previous selections
  document.getElementById("project_code").value = "";
  document.getElementById("user_id").value = "";
  document.getElementById("module_code").value = "";

  // Load Dropdowns
  await loadProjects();
  await loadMasterUsers(); 
  await loadModules();
};

closeModalBtn.onclick = cancelBtn.onclick = () => modal.style.display = "none";

/* 1. LOAD PROJECTS DROPDOWN */
async function loadProjects(selected = "") {
  try {
    const res = await fetch(`${API_BASE}/options/projects`);
    const data = await res.json();
    
    const select = document.getElementById("project_code");
    select.innerHTML = '<option value="">Select Project</option>';
    
    data.forEach(p => {
        const isSelected = p.project_code === selected ? "selected" : "";
        select.innerHTML += `<option value="${p.project_code}" ${isSelected}>${p.project_name}</option>`;
    });
  } catch(e) { console.error("Error loading projects", e); }
}

/* 2. LOAD MASTER USERS DROPDOWN */
async function loadMasterUsers(selectedId = "") {
  try {
    const res = await fetch(`${API_BASE}/options/master-users`);
    const data = await res.json();
    
    const select = document.getElementById("user_id");
    select.innerHTML = '<option value="">Select User</option>';
    
    data.forEach(u => {
        const isSelected = (u.project_user_id == selectedId) ? "selected" : "";
        // CHANGE: Removed email display "(${u.user_name})" from the text
        select.innerHTML += `<option value="${u.project_user_id}" ${isSelected}>${u.project_user_name}</option>`;
    });
  } catch(e) { console.error("Error loading users", e); }
}

/* 3. LOAD MODULES DROPDOWN */
async function loadModules(selected = "") {
  try {
    const res = await fetch(`${API_BASE}/options/modules`);
    const data = await res.json();
    
    const select = document.getElementById("module_code");
    select.innerHTML = '<option value="">Select Module</option>';
    
    data.forEach(m => {
        const isSelected = m.module_code === selected ? "selected" : "";
        select.innerHTML += `<option value="${m.module_code}" ${isSelected}>${m.module_name}</option>`;
    });
  } catch(e) { console.error("Error loading modules", e); }
}

/* 4. LOAD MAIN TABLE DATA */
async function loadTableData() {
  try {
    const res = await fetch(`${API_BASE}/`);
    const data = await res.json();
    const tbody = document.querySelector("#userTable tbody");
    tbody.innerHTML = "";

    data.forEach(u => {
      tbody.innerHTML += `
        <tr>
          <td>${u.project_name || "-"}</td>
          <td>${u.project_user_name}</td>
          <td>${u.email}</td>
          <td>${u.modules || "-"}</td>
          <td>${u.status}</td>
          <td class="actions">
            <i class="fa fa-edit" onclick="editUser(${u.project_user_id})"></i>
            <i class="fa fa-times" onclick="deleteUser(${u.project_user_id})"></i>
          </td>
        </tr>`;
    });
  } catch(e) { console.error("Error loading table", e); }
}

/* 5. EDIT USER ASSIGNMENT */
async function editUser(id) {
  editId = id;
  modal.style.display = "flex";
  modalTitle.innerText = "Edit Assignment";

  try {
    const res = await fetch(`${API_BASE}/id/${id}`);
    const u = await res.json();

    await loadProjects(u.project_code);
    await loadMasterUsers(u.user_id);
    await loadModules(u.module_codes?.[0]);

    const statusVal = u.status === "Active" ? "Active" : "Inactive";
    document.querySelector(`input[name="status"][value="${statusVal}"]`).checked = true;
  } catch(e) { console.error("Error fetching details", e); }
}

/* 6. SAVE (POST/PUT) */
saveBtn.onclick = async () => {
  const pCode = document.getElementById("project_code").value;
  const uId = document.getElementById("user_id").value;
  const mCode = document.getElementById("module_code").value;

  if (!pCode) {
      alert("Please select a Project.");
      return;
  }
  
  if (!editId && !uId) {
      alert("Please select a User.");
      return;
  }

  const payload = {
    project_code: pCode,
    // Ensure we send an integer, not a string, to avoid server validation errors
    user_id: uId ? parseInt(uId) : null, 
    module_code: mCode ? [mCode] : [],
    status: document.querySelector('input[name="status"]:checked').value === "Active" ? 1 : 0
  };

  const url = editId ? `${API_BASE}/${editId}` : `${API_BASE}/`;
  const method = editId ? "PUT" : "POST";

  try {
      const res = await fetch(url, {
        method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const result = await res.json();
      
      if (res.ok) {
          alert(result.message);
          modal.style.display = "none";
          loadTableData();
      } else {
          // Fix for [object Object] error
          // If result.detail is an array (Pydantic validation errors), map them to a string
          let errorMsg = "";
          if (Array.isArray(result.detail)) {
              errorMsg = result.detail.map(err => `• ${err.msg}`).join("\n");
          } else {
              errorMsg = result.detail || "Unknown error occurred";
          }
          alert("Error:\n" + errorMsg);
      }
  } catch(e) {
      alert("Network error occurred: " + e.message);
      console.error(e);
  }
};

/* 7. DELETE */
async function deleteUser(id) {
  if (!confirm("Delete this project user assignment?")) return;
  try {
      const res = await fetch(`${API_BASE}/${id}`, { method: "DELETE" });
      const result = await res.json();
      alert(result.message);
      loadTableData();
  } catch(e) { console.error("Delete failed", e); }
}

/* SEARCH */
const searchBox = document.getElementById("searchBox");
searchBox.onkeyup = () => {
  const v = searchBox.value.toLowerCase();
  document.querySelectorAll("#userTable tbody tr").forEach(r => {
    r.style.display = r.textContent.toLowerCase().includes(v) ? "" : "none";
  });
};

window.onload = loadTableData;
</script>

</body>
</html>
