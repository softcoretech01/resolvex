<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Client Master</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* --- TICKET SYSTEM DESIGN APPLIED --- */

/* CSS STYLES */
body{margin:0;font-family:Segoe UI, sans-serif;background:#fff}
.page{padding:14px}

/* HEADER */
.title-bar{background:#d6ece8;padding:8px 14px;border-radius:10px;display:flex;justify-content:space-between;align-items:center}
.title-bar h2{margin:0;font-size:18px;color:#063b52}
.new-btn{background:#ffb199;border:none;padding:6px 14px;border-radius:8px;font-size:14px;cursor:pointer}

/* SEARCH & TABLE */
.search-row{display:flex;justify-content:flex-end;margin:8px 0 10px}
.search-row input{padding:6px 12px;width:300px;font-size:14px;border:1px solid #ccc;border-radius:8px}

table{width:100%;border-collapse:collapse;font-size:14px}
thead tr{background:#b6e4e5}
th,td{padding:8px 12px;border:1px solid #e0e0e0}
tbody tr:nth-child(even){background:#fafafa}

/* Actions Styling */
.actions i{margin-right:8px;cursor:pointer}
.edit{color:#2c7be5}
.delete{color:#e63946}

/* MODAL COMMON */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);justify-content:center;align-items:center;z-index:1000}
.modal-content{
  background:#fff;
  width:600px; /* Width suitable for Client form */
  padding:20px 25px;
  border-radius:14px;
  max-height:90vh;
  overflow-y:auto;
}

/* FORM GRID */
.form-grid{
  display:grid;
  grid-template-columns: 1fr 1fr; /* 2 Columns */
  gap: 15px 20px;
}

label{font-weight:600;font-size:12px;display:block;margin-bottom:3px;color:#444}
input,select,textarea{
  width:100%;
  padding:6px 8px;
  font-size:13px;
  border:1px solid #ccc;
  border-radius:6px;
  height:36px;
  box-sizing:border-box;
}

/* Compact Textarea for Address */
textarea{
  height:auto;
  min-height:60px;
  resize:vertical;
  font-family: Segoe UI, sans-serif;
}
.full{grid-column:1/-1} 

/* BUTTONS */
.modal-footer{display:flex;justify-content:flex-end;margin-top:20px;gap:12px}
.btn-cancel{background:#9e9e9e;color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer}
.btn-save{background:#1aaa8b;color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer}

</style>
</head>

<body>

<div class="page">
  <div class="title-bar">
    <h2>Client Master</h2>
    <button class="new-btn" id="btnOpenCreate">+ New</button>
  </div>

  <div class="search-row">
    <input id="searchBox" placeholder="Search clients..." onkeyup="filterTable()">
  </div>

  <table>
    <thead>
      <tr>
        <th>Code</th>
        <th>Name</th>
        <th>Country</th>
        <th>City</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="modal" id="createModal">
  <div class="modal-content">
    <h3 id="modalTitle" style="text-align:center; margin-top:0">Add Client</h3>

    <div class="form-grid">
      <div class="full">
        <label>Client Name *</label>
        <input type="text" id="clientName" placeholder="Enter client name">
      </div>

      <div>
        <label>Country *</label>
        <input type="text" id="country" placeholder="Country">
      </div>
      <div>
        <label>State</label>
        <input type="text" id="state" placeholder="State">
      </div>

      <div>
        <label>City</label>
        <input type="text" id="city" placeholder="City">
      </div>
      <div>
        <label>Status</label>
        <select id="status">
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>
      </div>

      <div class="full">
        <label>Address</label>
        <textarea id="address" placeholder="Full Address"></textarea>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="document.getElementById('createModal').style.display='none'">Cancel</button>
      <button class="btn-save" onclick="saveClient()">Save</button>
    </div>
  </div>
</div>

<script>
// --- CONFIGURATION ---
const BASE_API_URL = window.location.origin === "null" || window.location.origin.startsWith("file") 
    ? "http://127.0.0.1:8000" 
    : window.location.origin;
const API_BASE = `${BASE_API_URL}/api/clients`;

// --- GLOBAL STATE ---
let clientsList = [];
let editingCode = null;

// --- DOM ELEMENTS ---
const tbody = document.getElementById("tbody");
const createModal = document.getElementById("createModal");
const modalTitle = document.getElementById("modalTitle");

// Form Inputs
const elName = document.getElementById("clientName");
const elCountry = document.getElementById("country");
const elState = document.getElementById("state");
const elCity = document.getElementById("city");
const elAddress = document.getElementById("address");
const elStatus = document.getElementById("status");

// --- INITIALIZATION ---
window.onload = function() {
  loadClients();
  document.getElementById("btnOpenCreate").addEventListener("click", openCreateModal);
};

/* ================= API CALLS ================= */

async function loadClients(){
  try {
    const res = await fetch(API_BASE);
    if(!res.ok) throw new Error("Failed");
    clientsList = await res.json();
    renderTable(clientsList);
  } catch(e) {
    console.error(e);
    tbody.innerHTML = `<tr><td colspan="6" style="color:red;text-align:center">Error loading clients.</td></tr>`;
  }
}

async function saveClient() {
  const data = {
    client_name: elName.value.trim(),
    country: elCountry.value.trim(),
    state: elState.value.trim(),
    city: elCity.value.trim(),
    address: elAddress.value.trim(),
    status: elStatus.value
  };

  if (!data.client_name || !data.country) {
    alert("Client Name and Country are required (*)");
    return;
  }

  const url = editingCode ? `${API_BASE}/${editingCode}` : API_BASE;
  const method = editingCode ? "PUT" : "POST";

  try {
    const res = await fetch(url, {
      method: method,
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });
    
    const result = await res.json();
    if (!res.ok) throw new Error(result.detail || result.message || "Save Failed");

    alert(result.message || "Saved successfully");
    createModal.style.display = "none";
    loadClients(); 
  } catch(e) {
    console.error(e);
    alert("Error: " + e.message);
  }
}

async function deleteClient(code, name){
  if(!confirm(`Are you sure you want to delete client "${name}"?`)) return;
  try {
    const res = await fetch(`${API_BASE}/${code}`, { method: "DELETE" });
    const result = await res.json();
    if(res.ok) {
        alert(result.message || "Deleted");
        loadClients();
    } else {
        alert(result.message || "Deletion failed");
    }
  } catch(e){ console.error(e); }
}

/* ================= EDIT & UI ================= */

function openCreateModal(){
  editingCode = null;
  modalTitle.innerText = "Add Client";

  // Reset Form
  elName.value = "";
  elCountry.value = "";
  elState.value = "";
  elCity.value = "";
  elAddress.value = "";
  elStatus.value = "Active";
  
  createModal.style.display = "flex";
}

function editClient(code) {
  const item = clientsList.find(x => x.client_code === code);
  if (!item) return;

  editingCode = code;
  modalTitle.innerText = "Edit Client";

  // Populate Form
  elName.value = item.client_name || "";
  elCountry.value = item.country || "";
  elState.value = item.state || "";
  elCity.value = item.city || "";
  elAddress.value = item.address || "";
  
  // Normalize Status
  const s = item.status;
  elStatus.value = (s === "1" || s === 1 || s === "Active") ? "Active" : "Inactive";

  createModal.style.display = "flex";
}

function renderTable(data){
  tbody.innerHTML = "";
  data.forEach((item) => {
    const statusLabel = (item.status === 1 || item.status === '1' || item.status === 'Active') ? "Active" : "Inactive";

    tbody.innerHTML += `
      <tr>
        <td>${item.client_code}</td>
        <td>${item.client_name}</td>
        <td>${item.country || '-'}</td>
        <td>${item.city || '-'}</td>
        <td>${statusLabel}</td>
        <td class="actions">
          <i class="fa fa-pen edit" onclick="editClient('${item.client_code}')"></i>
          <i class="fa fa-times delete" onclick="deleteClient('${item.client_code}', '${item.client_name}')"></i>
        </td>
      </tr>`;
  });
}

function filterTable(){
  const term = document.getElementById("searchBox").value.toLowerCase();
  
  const filtered = clientsList.filter(item => {
    const combinedData = [
      item.client_code,
      item.client_name,
      item.country,
      item.city,
      item.status
    ].map(val => val ? val.toString().toLowerCase() : "").join(" ");

    return combinedData.includes(term);
  });
  
  renderTable(filtered);
}
</script>

</body>
</html>
