<!DOCTYPE html>
<html>
<head>
<title>System Changes</title>
<style>
body{font-family:Segoe UI;padding:20px}
textarea{width:100%;height:150px;margin-top:10px}
button{padding:10px 18px;margin-top:10px;background:#1aaa8b;color:white;border:none;border-radius:6px}
</style>
</head>
<body>

<h2>Database Changes</h2>
<textarea id="dbChanges"></textarea>

<h2>Code Changes</h2>
<textarea id="codeChanges"></textarea>

<button onclick="saveChanges()">Save Changes</button>

<script>
async function saveChanges(){
    const db = document.getElementById("dbChanges").value;
    const code = document.getElementById("codeChanges").value;

    await fetch("/api/common/save_changes", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ db_changes:db, code_changes:code })
    });

    alert("Changes saved!");
}
</script>

</body>
</html>
