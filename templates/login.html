<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: #2c3e50;
            color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-container {
            background: #34495e;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        h2 {
            margin-bottom: 30px;
            color: #3498db;
            font-weight: 500;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #7f8c8d;
            background: #2c3e50;
            color: white;
            font-size: 16px;
        }
        input:focus {
            border-color: #3498db;
            outline: none;
        }
        button {
            background: #3498db;
            cursor: pointer;
            border: none;
            font-weight: 600;
        }
        button:hover {
            background: #2980b9;
        }
        .signup-link {
            display: block;
            color: #bdc3c7;
            margin-top: 10px;
            font-size: 14px;
            text-decoration: none;
        }
        .signup-link:hover {
            color: #3498db;
        }
        #error-message {
            min-height: 22px;
            margin-bottom: 10px;
            font-size: 15px;
        }
    </style>
</head>

<body>
<div class="login-container">
    <h2>User Login</h2>
    <form id="loginForm" autocomplete="off">
        <input type="email" id="email" placeholder="Email" required autocomplete="username">
        <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
        <p id="error-message" style="color: #e74c3c;"></p>
        <button type="submit">Sign In</button>
    </form>
    <a href="/register.html" class="signup-link">Don't have an account? Sign Up</a>
</div>

<script>
// Set API URL for local files or deployments
const API_URL = (window.location.hostname === "localhost" || window.location.hostname.startsWith("127.")) 
  ? "http://127.0.0.1:8000/api/login" 
  : "/api/login";

document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorMessage = document.getElementById("error-message");
    errorMessage.textContent = "";

    if (!email || !password) {
        errorMessage.textContent = "Please enter both email and password.";
        return;
    }

    try {
        // Compose API payload
        const payload = { user_name: email, password };
        const res = await fetch(API_URL, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        });

        let result;
        try {
            result = await res.json();
        } catch {
            throw new Error("Server returned invalid response.");
        }

        if (!res.ok) {
            throw new Error(result.detail || result.message || "Login failed.");
        }

        // If backend returns user_name/role, store in localStorage
        localStorage.setItem("userName", result.user_name || email);
        if (result.role) localStorage.setItem("userRole", result.role);

        // Redirect to dashboard/root - adjust as required
        window.location.href = "/index.html";
    } catch (err) {
        errorMessage.textContent = err.message;
        console.error("Login error:", err);
    }
});
</script>
</body>
</html>
