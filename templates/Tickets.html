<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Tickets System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* --- STYLES --- */
    body {
      margin: 0;
      font-family: Segoe UI, sans-serif;
      background: #fff
    }

    .page {
      padding: 14px
    }

    .title-bar {
      background: #d6ece8;
      padding: 8px 14px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    .title-bar h2 {
      margin: 0;
      font-size: 18px;
      color: #063b52
    }

    .new-btn {
      background: #ffb199;
      border: none;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer
    }

    .search-row {
      display: flex;
      justify-content: flex-end;
      margin: 8px 0 10px
    }

    .search-row input {
      padding: 6px 12px;
      width: 300px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 8px
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px
    }

    thead tr {
      background: #b6e4e5
    }

    th,
    td {
      padding: 8px 12px;
      border: 1px solid #e0e0e0
    }

    tbody tr:nth-child(even) {
      background: #fafafa
    }

    .ticket-link {
      color: #2c7be5;
      text-decoration: underline;
      cursor: pointer;
      font-weight: 600;
    }

    .actions i {
      margin-right: 8px;
      cursor: pointer
    }

    .delete {
      color: #e63946
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      justify-content: center;
      align-items: center;
      z-index: 1000
    }

    .modal-content {
      background: #fff;
      width: 1000px;
      padding: 15px 20px;
      border-radius: 14px;
      max-height: 95vh;
      overflow-y: auto;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px 15px;
    }

    label {
      font-weight: 600;
      font-size: 12px;
      display: block;
      margin-bottom: 3px;
      color: #444
    }

    /* inputs are given a subtle background to differentiate them from labels/headings */
    input,
    select,
    textarea {
      width: 100%;
      padding: 6px 8px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 6px;
      height: 36px;
      box-sizing: border-box;
      background: #fafafa;
    }

    textarea {
      height: auto;
      min-height: 40px;
      resize: vertical;
      font-family: Segoe UI, sans-serif;
    }

    /* ensure disabled fields remain visually distinct */
    input:disabled,
    select:disabled,
    textarea:disabled {
      background-color: #e9ecef;
      color: #666;
      border-color: #ddd;
      cursor: not-allowed;
    }

    .full {
      grid-column: 1/-1
    }

    .span-2 {
      grid-column: span 2
    }

    input:disabled,
    select:disabled,
    textarea:disabled {
      background-color: #f0f0f0;
      color: #666;
      border-color: #ddd;
      cursor: not-allowed;
    }

    .section-title {
      grid-column: 1 / -1;
      margin-top: 10px;
      font-size: 14px;
      font-weight: 700;
      color: #063b52;
      border-bottom: 2px solid #d6ece8;
      padding-bottom: 5px;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 15px;
      gap: 12px
    }

    .btn-cancel {
      background: #9e9e9e;
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer
    }

    .btn-save {
      background: #1aaa8b;
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer
    }
  </style>
</head>

<body>

  <div class="page">
    <div class="title-bar">
      <h2>Tickets</h2>
      <button class="new-btn" id="btnOpenCreate" style="display:none">+ New</button>
    </div>
    <div class="search-row">
      <input id="searchBox" placeholder="Keyword Search..." onkeyup="filterTable()">
    </div>
    <table>
      <thead>
        <tr>
          <th>Ticket Number</th>
          <th>CIF No</th>
          <th>Date</th>
          <th>Priority</th>
          <th>Severity</th>
          <th>Affected Users</th>
          <th>Issue Type</th>
          <th>Screen</th>
          <th>Client</th>
          <th>Assigned To</th>
          <th>Reported Person</th>
          <th>Status</th>
          <th>Time Spent</th>
          <th>Total Time Spent</th>
          <th id="actionHeader">Actions</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="modal" id="manageModal">
    <div class="modal-content">
      <h3 id="modalTitle" style="text-align:center; margin-top:0">Manage Ticket</h3>
      <div class="form-grid">
        <div class="section-title">Ticket Information</div>
        <div><label>Project *</label><select id="t_project" class="std-field"></select></div>
        <div><label>Module Type *</label><select id="t_moduleType" class="std-field"></select></div>
        <div><label>Module *</label><select id="t_module" class="std-field"></select></div>
        <div><label>Reported Client *</label><select id="t_client" class="std-field"></select></div>
        <div><label>Priority *</label>
          <select id="t_priority" class="std-field">
            <option value="">Select Priority</option>
            <option value="P1">P1 - Immediate</option>
            <option value="P2">P2 - Same Day</option>
            <option value="P3">P3 - 2-3 days</option>
            <option value="P4">P4 - Low / KIV</option>
          </select>
        </div>
        <div><label>Severity *</label>
          <select id="t_severity" class="std-field">
            <option value="Critical">Critical (Ex. System down / data loss)</option>
            <option value="High">High (Ex. Major function not working)</option>
            <option value="Medium">Medium (Ex. Partial issue)</option>
            <option value="Low">Low (Ex. Minor bug/UI)</option>
          </select>
        </div>
        <div><label>Affected Users</label>
          <select id="t_affected" class="std-field">
            <option value="">Select</option>
            <option value="Single User">Single User</option>
            <option value="Department">Department</option>
            <option value="All Users">All Users</option>
          </select>
        </div>

        <div><label>Reported Date</label><input type="date" id="t_rDate" class="std-field"></div>
        <div><label>Reported Person</label><input type="text" id="t_reported_person" class="std-field"
            placeholder="Name"></div>
        <div><label>Target Date</label><input type="date" id="t_tDate" class="std-field"></div>

        <div><label>Assigned To</label><select id="t_assigned" class="std-field"></select></div>
        <div><label>Screen</label><input type="text" id="t_screen" class="std-field" placeholder="Screen Name"></div>
        <div><label>Short Name</label><input type="text" id="t_short_name" class="std-field" placeholder="Short Name"
            maxlength="100"></div>
        <div>
          <label>Issue Type *</label>
          <select id="t_issue" class="std-field">
            <option value="">Select Type</option>
            <option value="New">New</option>
            <option value="Bug">Bug</option>
            <option value="Data Correction">Data Correction</option>
            <option value="Internal">Internal</option>
          </select>
        </div>

        <div>
          <label>Environment *</label>
          <select id="t_environment" class="std-field">
            <option value="beta">Beta</option>
            <option value="production">Production</option>
          </select>
        </div>

        <div class="full"><label>Issue Description</label><textarea id="t_desc" class="std-field"></textarea></div>
        <div class="full">
          <label>Attachment</label>
          <input type="file" id="t_attach_input" class="std-field" multiple>
          <div id="t_attach_link" style="margin-top:5px; font-size:13px; display:flex; flex-direction:row; gap:10px;">
          </div>
        </div>


        <div class="full">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px;">
            <label style="margin-bottom: 0;">SQL Script</label>
            <a href="#" id="btnDownloadSQL"
              style="font-size: 12px; color: #2c7be5; text-decoration: underline; font-weight: bold; display: none;"
              onclick="downloadSQLScriptOnly(event)">Download DML Script (.sql)</a>
          </div>
          <textarea id="t_sql_script" class="std-field" placeholder="Paste SQL script here..."
            onkeyup="checkWordCount(this, 10000); toggleSQLDownloadBtn();"></textarea>
          <div id="sql_word_count" style="font-size: 11px; color: #666;">Words: 0/10000</div>
        </div>

        <div class="section-title resolution-section">Resolution</div>
        <div class="resolution-section"><label>Root Cause</label><textarea id="t_root"
            placeholder="Root cause analysis..."></textarea></div>
        <div class="resolution-section"><label>Solution</label><textarea id="t_solution"
            placeholder="Solution details..."></textarea></div>
        <div class="resolution-section">
          <label>Status</label>
          <select id="t_status" onchange="calculateTimePreview()">
            <option value="Open">Open</option>
            <option value="In Progress">In Progress</option>
            <option value="Waiting for confirmation">Waiting for confirmation</option>
            <option value="KIV">KIV</option>
            <option value="Closed">Closed</option>
          </select>
        </div>
        <div class="resolution-section">
          <label>Time Spent</label>
          <input type="text" id="t_time_display" placeholder="e.g. 2h 30m"
            title="Enter time spent (e.g. 1d 4h 30m). Auto-filled when closed.">
        </div>

        <div class="resolution-section full">
          <label>Database Changes</label>
          <!-- stored by name so later JS can find it without error -->
          <textarea id="t_db_changes" name="db_changes" placeholder="Describe DB modifications..."></textarea>
        </div>

        <div class="resolution-section full">
          <label>Code Changes</label>
          <textarea id="t_code_changes" name="code_changes" placeholder="Describe code updates..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="document.getElementById('manageModal').style.display='none'">Close</button>

        <!-- PRINT BUTTON (hidden by default) -->
        <button class="btn-save" id="btnPrint" onclick="printTicket()" style="display:none;background:#4b6cb7">
          Print
        </button>

        <button class="btn-save" onclick="saveTicket()">Save</button>
      </div>
    </div>
  </div>

  <script>

    const BASE_API_URL = window.location.origin === "null" || window.location.origin.startsWith("file")
      ? "http://127.0.0.1:8000"
      : window.location.origin;
    const API_BASE = `${BASE_API_URL}/api/tickets`;
    let tickets = [];
    let currentTicketCode = null;
    let currentTicketData = null;
    let selectedFiles = [];
    const userRole = localStorage.getItem("userRole") || "GUEST";
    const isAdminOrHelpdesk = ["ADMIN", "HELPDESK"].includes(userRole);
    const tbody = document.getElementById("tbody");
    const manageModal = document.getElementById("manageModal");
    const modalTitle = document.getElementById("modalTitle");
    let attachLinkDiv = document.getElementById("t_attach_link");

    // --- renderSelectedFiles function (global, above saveTicket) ---
    function renderSelectedFiles() {
      const attachLinkDiv = document.getElementById("t_attach_link");
      attachLinkDiv.innerHTML = "";
      // Set vertical layout for the container
      attachLinkDiv.style.display = "flex";
      attachLinkDiv.style.flexDirection = "column";
      attachLinkDiv.style.gap = "8px";
      selectedFiles.forEach((file, i) => {
        const row = document.createElement("div");
        row.style.display = "flex";
        row.style.gap = "10px";
        row.style.alignItems = "center";

        // Attachment filename as a bold blue link
        const link = document.createElement("a");
        link.textContent = file.name;
        link.href = URL.createObjectURL(file);
        link.target = "_blank";
        link.style.color = "#2c7be5";
        link.style.textDecoration = "underline";
        link.style.fontWeight = "bold";
        row.appendChild(link);

        // Download icon (inline SVG)
        const download = document.createElement("a");
        download.href = URL.createObjectURL(file);
        download.download = file.name;
        download.title = "Download";
        download.style.marginLeft = "6px";
        download.style.display = "flex";
        download.style.alignItems = "center";
        download.innerHTML = `<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 20 20' fill='none' style='display:inline-block;vertical-align:middle;'><path d='M10 2v12m0 0l-4-4m4 4l4-4M4 18h12' stroke='#1976d2' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>`;
        row.appendChild(download);

        // Remove icon (dustbin/trash SVG as a link, not a button)
        const remove = document.createElement("a");
        remove.href = "#";
        remove.title = "Remove";
        remove.style.marginLeft = "4px";
        remove.style.display = "flex";
        remove.style.alignItems = "center";
        remove.innerHTML = `<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' style='display:inline-block;vertical-align:middle;'><path d='M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V6h12z' stroke='#e63946' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/><line x1='10' y1='11' x2='10' y2='17' stroke='#e63946' stroke-width='2' stroke-linecap='round'/><line x1='14' y1='11' x2='14' y2='17' stroke='#e63946' stroke-width='2' stroke-linecap='round'/></svg>`;
        remove.onclick = (e) => {
          e.preventDefault();
          selectedFiles.splice(i, 1);
          renderSelectedFiles();
        };
        row.appendChild(remove);

        attachLinkDiv.appendChild(row);
      });
    }

    window.onload = function () {
      if (isAdminOrHelpdesk) {
        document.getElementById("btnOpenCreate").style.display = "block";
        document.getElementById("actionHeader").style.display = "";
      } else {
        document.getElementById("btnOpenCreate").style.display = "none";
        document.getElementById("actionHeader").style.display = "none";
      }
      loadTickets();
      document.getElementById("btnOpenCreate").addEventListener("click", openCreateMode);
      document.getElementById("t_project").addEventListener("change", function () {
        const pCode = this.value;
        loadModules(pCode);
        loadAssignedUsers(pCode);
        const assignElem = document.getElementById("t_assigned");
        assignElem.disabled = !pCode;
        if (!pCode) assignElem.value = "";
      });

      // --- File input listener (safe placement) ---
      const fileInput = document.getElementById("t_attach_input");
      if (fileInput) {
        fileInput.addEventListener("change", function () {
          for (let i = 0; i < fileInput.files.length; i++) {
            const file = fileInput.files[i];
            if (!selectedFiles.some(f => f.name === file.name && f.size === file.size)) {
              selectedFiles.push(file);
            }
          }
          renderSelectedFiles();
        });
      }

    };

    async function loadTickets() {
      try {
        tbody.innerHTML = `<tr><td colspan="15" style="text-align:center; color:#888; padding:20px;">Loading tickets...</td></tr>`;
        const res = await fetch(API_BASE);
        console.log("Tickets API status:", res.status, res.url);
        if (!res.ok) {
          const errText = await res.text();
          throw new Error(`HTTP ${res.status} — ${errText.substring(0, 200)}`);
        }
        const data = await res.json();
        console.log("Tickets received:", Array.isArray(data) ? data.length + " rows" : typeof data);
        if (!Array.isArray(data)) {
          throw new Error("Expected array, got: " + JSON.stringify(data).substring(0, 100));
        }
        tickets = data;
        renderTable(tickets);
      } catch (e) {
        console.error("loadTickets error:", e);
        tbody.innerHTML = `<tr><td colspan="15" style="text-align:center; color:red; padding:20px;">Error loading data: ${e.message}</td></tr>`;
      }
    }
    async function fillSelect(elem, url, label) {
      const res = await fetch(url);
      const data = await res.json();
      elem.innerHTML = `<option value="">${label}</option>`;
      data.forEach(i => elem.innerHTML += `<option value="${i.code}">${i.name}</option>`);
    }
    async function loadInitialDropdowns() {
      await fillSelect(document.getElementById("t_project"), `${API_BASE}/dropdown/projects`, "Select Project");
      await fillSelect(document.getElementById("t_moduleType"), `${API_BASE}/dropdown/module-types`, "Select Type");
      await fillSelect(document.getElementById("t_client"), `${API_BASE}/dropdown/clients`, "Select Client");
    }
    async function loadModules(pCode, selectedVal = null) {
      const elem = document.getElementById("t_module");
      await fillSelect(elem, `${API_BASE}/dropdown/modules?project_code=${pCode}`, "Select Module");
      if (selectedVal) elem.value = selectedVal;
    }
    async function loadAssignedUsers(pCode, selectedVal = null) {
      const elem = document.getElementById("t_assigned");
      // clear first
      elem.innerHTML = `<option value="">Select User</option>`;
      // determine endpoint – if project code is provided ask for filtered list, otherwise fetch all
      const url = pCode ?
        `${API_BASE}/dropdown/project-users?project_code=${pCode}` :
        `${API_BASE}/dropdown/project-users`;

      try {
        const res = await fetch(url);
        const data = await res.json();
        console.log("loaded assigned users for project", pCode, data);
        if (Array.isArray(data) && data.length) {
          data.forEach(i => elem.innerHTML += `<option value="${i.code}">${i.name}</option>`);
        } else {
          elem.innerHTML = `<option value="">No users available</option>`;
        }
        if (selectedVal) elem.value = selectedVal;
      } catch (e) {
        console.error("failed to load assigned users", e);
      }
    }

    async function openCreateMode() {
      currentTicketCode = null;
      currentTicketData = null;
      modalTitle.innerText = "New Ticket";
      document.querySelectorAll("input, select, textarea").forEach(el => el.value = "");
      document.getElementById("t_priority").value = "";
      document.getElementById("t_attach_link").innerHTML = "";
      document.getElementById("t_status").value = "Open";
      document.getElementById("t_affected").value = "";
      document.getElementById("t_environment").value = "beta";

      const now = new Date();
      document.getElementById("t_rDate").valueAsDate = now;
      document.getElementById("t_reported_person").value = ""; // Clear Name

      await loadInitialDropdowns();

      // assigned-user depends on project; start disabled until a project is chosen
      const assignElem = document.getElementById("t_assigned");
      assignElem.disabled = true;

      // populate assigned users list – if no project is selected the new backend will
      // return the full active user list, otherwise it will be filtered.
      await loadAssignedUsers(document.getElementById("t_project").value);

      document.querySelectorAll(".resolution-section").forEach(el => el.style.display = "none");
      toggleStandardFields(true);
      toggleSQLDownloadBtn();
      manageModal.style.display = "flex";
    }

    async function openManageMode(ticketCode) {
      // Log all DOM elements before setting their values
      const elementIds = [
        "t_project", "t_moduleType", "t_client", "t_priority", "t_severity", "t_affected", "t_rDate", "t_reported_person", "t_tDate", "t_issue", "t_environment", "t_sql_script", "t_desc", "t_screen", "t_db_changes", "t_code_changes", "t_root", "t_solution", "t_status", "t_time_display", "manageModal", "modalTitle"
      ];
      elementIds.forEach(id => {
        const el = document.getElementById(id);
        if (!el) {
          console.error(`Element with id '${id}' is missing or undefined!`);
        } else {
          console.log(`Element '${id}' found:`, el);
        }
      });
      try {
        console.log('openManageMode called', { ticketCode, tickets });
        if (!tickets || !Array.isArray(tickets)) {
          console.error('Tickets array is missing or invalid:', tickets);
          alert('Cannot edit: ticket data not loaded.');
          return;
        }
        let t = tickets.find(tk => tk.ticket_code === ticketCode);
        if (!t) {
          console.error('No ticket found with code:', ticketCode);
          alert('Cannot edit: ticket not found.');
          return;
        }
        console.log('Selected ticket from list:', t);
        // fetch fresh copy in case some fields (db/code changes) were not included in the list
        try {
          const resp = await fetch(`${API_BASE}/${t.ticket_code}`);
          if (resp.ok) {
            const detail = await resp.json();
            t = detail; // replace with full record
            console.log('Fetched ticket details:', t);
          }
        } catch (err) {
          console.warn('Unable to fetch ticket detail, using list item', err);
        }
        if (!t) {
          console.error('No ticket found with code:', ticketCode);
          alert('Cannot edit: ticket not found.');
          return;
        }
        currentTicketCode = t.ticket_code;
        currentTicketData = t;
        modalTitle.innerText = "Manage Ticket (" + t.ticket_code + ")";
        await loadInitialDropdowns();
        // Set dropdown values after options are loaded
        // Load dropdowns, then set values
        document.getElementById("t_project").value = t.project_code;
        document.getElementById("t_moduleType").value = t.module_type_code;
        document.getElementById("t_client").value = t.reported_user_code;
        document.getElementById("t_priority").value = t.priority;
        document.getElementById("t_severity").value = t.severity;
        document.getElementById("t_affected").value = t.affected_user || "";
        document.getElementById("t_rDate").value = t.reported_date;
        document.getElementById("t_reported_person").value = t.reported_person || ""; // NAME
        document.getElementById("t_tDate").value = t.target_date || "";
        document.getElementById("t_issue").value = t.issue_short;
        document.getElementById("t_short_name").value = t.short_name || "";
        document.getElementById("t_environment").value = t.environment || "beta";
        document.getElementById("t_sql_script").value = t.sql_script || "";
        checkWordCount(document.getElementById("t_sql_script"), 10000);
        document.getElementById("t_desc").value = t.issue_desc || "";
        document.getElementById("t_screen").value = t.screen || "";
        // extract just the last entry from the stored log so that the textarea
        // shows the most recent change.  this gives the user a reminder of what was
        // added previously without dumping the entire history in the editor.
        function lastEntry(log) {
          if (!log) return "";
          const parts = log.split('#############################################################');
          // filter out empty pieces and take last
          const filtered = parts.filter(p => p && p.trim());
          if (filtered.length === 0) return "";
          let last = filtered[filtered.length - 1].trim();
          // strip off the metadata line that starts with a dash
          const lines = last.split('\n');
          if (lines.length > 1 && lines[0].trim().startsWith('-')) {
            lines.shift();
          }
          // remaining lines are the actual description
          return lines.join('\n').trim();
        }
        document.getElementById("t_db_changes").value = lastEntry(t.db_changes);
        document.getElementById("t_code_changes").value = lastEntry(t.code_changes);
        // note: if no previous entry exists, the fields will be blank as before.
        await loadModules(t.project_code, t.module_code);
        await loadAssignedUsers(t.project_code, t.assigned_to_code);
        selectedFiles = [];
        currentTicketData = t;
        document.getElementById("t_root").value = t.root_cause || "";
        document.getElementById("t_solution").value = t.solution || "";
        document.getElementById("t_status").value = t.status || "Open";
        document.getElementById("t_time_display").value = t.actual_time_spent || "";

        // Render existing attachments
        renderExistingFiles(t.attachment, "t_attach_link");

        document.querySelectorAll(".resolution-section").forEach(el => el.style.display = "block");
        if (isAdminOrHelpdesk) { toggleStandardFields(true); } else { toggleStandardFields(false); }
        // show print button only when ticket is closed
        const printBtn = document.getElementById("btnPrint");
        if (t.status === "Closed") {
          printBtn.style.display = "inline-block";
        } else {
          printBtn.style.display = "none";
        }
        console.log('Opening manage modal');
        toggleSQLDownloadBtn();
        manageModal.style.display = "flex";
      } catch (e) {
        console.error('Error in openManageMode:', e);
        alert('An error occurred while opening the edit modal. See console for details.');
      }
    }

    function toggleStandardFields(enable) {
      const fields = document.querySelectorAll(".std-field");
      fields.forEach(el => { el.disabled = !enable; });
    }

    function validateTicketForm() {
      const rules = [
        { id: 't_project', label: 'Project' },
        { id: 't_moduleType', label: 'Module Type' },
        { id: 't_module', label: 'Module' },
        { id: 't_client', label: 'Reported Client' },
        // Priority is now optional
        // {id: 't_priority', label: 'Priority'},
        { id: 't_severity', label: 'Severity' },
        { id: 't_issue', label: 'Issue Type' },
        { id: 't_environment', label: 'Environment' },
        { id: 't_issue', label: 'Issue Description', checkValue: false } // note: only type
      ];
      for (const r of rules) {
        const el = document.getElementById(r.id);
        if (!el) continue;
        const val = el.value || '';
        if (r.checkValue === false) continue; // skip non-required text if any
        if (!val.trim()) {
          alert(r.label + ' is required');
          el.focus();
          return false;
        }
      }
      // Word count validation for SQL Script
      const sqlText = document.getElementById("t_sql_script").value.trim();
      const sqlWords = sqlText.split(/\s+/).filter(w => w.length > 0);
      if (sqlWords.length > 10000) {
        alert("SQL Script exceeds 10000 words limit!");
        document.getElementById("t_sql_script").focus();
        return false;
      }
      return true;
    }

    async function saveTicket() {
      if (!validateTicketForm()) return;
      const formData = new FormData();
      const append = (id, key) => {
        const el = document.getElementById(id);
        if (el && !el.disabled) { formData.append(key, el.value); }
      };
      append("t_project", "project_code");
      append("t_moduleType", "module_type_code");
      append("t_module", "module_code");
      append("t_client", "reported_user_code");
      append("t_priority", "priority");
      append("t_severity", "severity");
      append("t_affected", "affected_user");
      append("t_issue", "issue_short");
      append("t_short_name", "short_name");
      append("t_environment", "environment");
      append("t_sql_script", "sql_script");
      append("t_desc", "issue_desc");
      append("t_db_changes", "db_changes");
      append("t_code_changes", "code_changes");
      append("t_rDate", "reported_date");
      append("t_reported_person", "reported_person"); // NAME
      append("t_tDate", "target_date");
      append("t_assigned", "assigned_to_code");
      append("t_screen", "screen");

      // Add updated_by from localStorage
      formData.append("updated_by", localStorage.getItem("username") || "User");

      // Add all accumulated files to formData
      const fileInput = document.getElementById("t_attach_input");
      if (fileInput && !fileInput.disabled && selectedFiles.length > 0) {
        for (let i = 0; i < selectedFiles.length; i++) {
          formData.append("attachment", selectedFiles[i]);
        }
      }
      if (currentTicketCode) {
        formData.append("root_cause", document.getElementById("t_root").value);
        formData.append("solution", document.getElementById("t_solution").value);
        const status = document.getElementById("t_status").value;
        formData.append("status", status);

        let timeSpent = document.getElementById("t_time_display").value.trim();
        if (status === "Closed" && !timeSpent) {
          timeSpent = calculateTimeDiff();
        }
        formData.append("actual_time_spent", timeSpent);
        formData.append("total_time_spent", status === "Closed" ? calculateTotalSpent(currentTicketData.created_at) : "");
      } else {
        formData.append("status", "Open");
      }

      try {
        let url = API_BASE;
        let method = "POST";
        if (currentTicketCode) { url = `${API_BASE}/${currentTicketCode}`; method = "PUT"; }
        const res = await fetch(url, { method: method, body: formData });
        if (res.ok) {
          alert(currentTicketCode ? "Ticket Updated!" : "Ticket Created!");
          // 🔵 After ticket saved successfully send technical changes to log
          // use ids directly to avoid null reference
          const dbChanges = document.getElementById("t_db_changes").value;
          const codeChanges = document.getElementById("t_code_changes").value;
          // Removed fetch('/save_changes') call as it is obsolete and causes 404 error.
          // Reload ticket data and close the modal after saving
          await loadTickets();
          // Close the modal/tab after saving
          manageModal.style.display = "none";
        } else {
          const err = await res.json();
          alert("Error: " + JSON.stringify(err.detail || "Save failed"));
        }
      } catch (e) { console.error(e); alert("Network Error"); }
    }

    async function deleteTicket(code) {
      if (!confirm("Delete this ticket?")) return;
      await fetch(`${API_BASE}/${code}`, { method: "DELETE" });
      loadTickets();
    }

    function checkWordCount(textarea, maxWords) {
      const words = textarea.value.trim().split(/\s+/).filter(w => w.length > 0);
      const count = words.length;
      const display = document.getElementById("sql_word_count");
      if (display) {
        display.innerText = `Words: ${count}/${maxWords}`;
        display.style.color = count > maxWords ? "red" : "#666";
      }
    }

    function toggleSQLDownloadBtn() {
      const sqlText = document.getElementById("t_sql_script").value.trim();
      const btn = document.getElementById("btnDownloadSQL");
      if (btn) {
        btn.style.display = sqlText ? "inline-block" : "none";
      }
    }

    function downloadSQLScriptOnly(event) {
      if (event) event.preventDefault();
      const sqlText = document.getElementById("t_sql_script").value.trim();
      if (!sqlText) {
        alert("No SQL script found to download.");
        return;
      }
      const blob = new Blob([sqlText], { type: "text/plain;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      let filename = currentTicketCode ? `${currentTicketCode}_dml.sql` : "dml_script.sql";
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function calculateTimePreview() {
      const status = document.getElementById("t_status").value;
      const timeDisplay = document.getElementById("t_time_display");
      // Auto-fill only if field is empty and ticket is being closed
      if (status === "Closed" && currentTicketData && !timeDisplay.value.trim()) {
        timeDisplay.value = calculateTimeDiff();
      }
    }

    function calculateTimeDiff() {
      if (!currentTicketData || !currentTicketData.created_at) return "-";
      const start = new Date(currentTicketData.created_at);
      const end = new Date();
      if (isNaN(start.getTime())) return "-";

      const diffMs = end - start;
      if (diffMs < 0) return "0m";
      const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
      let result = "";
      if (days > 0) result += `${days}d `;
      if (hours > 0) result += `${hours}h `;
      result += `${minutes}m`;
      return result;
    }

    function renderExistingFiles(attachmentStr, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = "";
      if (!attachmentStr) return;
      const files = attachmentStr.split(",");
      files.forEach(f => {
        const row = document.createElement("div");
        row.style.display = "flex";
        row.style.gap = "10px";
        row.style.alignItems = "center";
        const link = document.createElement("a");
        link.textContent = f;
        link.href = `${BASE_API_URL}/uploaded_files/${f.trim()}`;
        link.target = "_blank";
        link.style.color = "#2c7be5";
        link.style.textDecoration = "underline";
        link.style.fontWeight = "bold";
        row.appendChild(link);
        container.appendChild(row);
      });
    }



    function calculateTotalSpent(createdAt, endedAt = null) {
      if (!createdAt) return "-";
      const start = new Date(createdAt);
      const end = endedAt ? new Date(endedAt) : new Date();
      if (isNaN(start.getTime()) || isNaN(end.getTime())) return "-";
      const diffMs = end - start;
      if (diffMs < 0) return "0m";
      const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
      let res = "";
      if (days > 0) res += `${days}d `;
      if (hours > 0) res += `${hours}h `;
      res += `${minutes}m`;
      return res;
    }

    async function printTicket(code) {
      try {
        // always fetch fresh data from server in case ticket was just edited
        const res = await fetch(`${API_BASE}/${code}`);
        if (!res.ok) { throw new Error("Ticket fetch failed"); }
        const ticket = await res.json();

        // store for print template
        localStorage.setItem("print_ticket", JSON.stringify(ticket));

        window.open("/static/print_ir.html", "_blank");
      } catch (e) {
        console.error(e);
        alert("Unable to load ticket for printing.");
      }
    }

    function downloadAttachments(attachmentStr) {
      if (!attachmentStr || attachmentStr === 'null') {
        alert("No attachments found for this ticket.");
        return;
      }
      const files = attachmentStr.split(",");
      files.forEach(f => {
        const link = document.createElement("a");
        link.href = `${BASE_API_URL}/uploaded_files/${f.trim()}`;
        link.download = f;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      });
    }

    function downloadTicketAsText(ticketCode) {
      const t = tickets.find(tk => tk.ticket_code === ticketCode);
      if (!t) {
        alert("Ticket not found.");
        return;
      }

      let execDateStr = t.reported_date || "";
      if (execDateStr) {
        const parts = execDateStr.split('-');
        if (parts.length === 3) {
          const year = parts[0];
          const monthNum = parseInt(parts[1], 10);
          const day = parseInt(parts[2], 10);
          const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
          const monthName = months[monthNum - 1] || parts[1];
          execDateStr = `${String(day).padStart(2, '0')}-${monthName}-${year}`;
        }
      } else {
        execDateStr = "N/A";
      }

      let moduleVal = t.module_name || "N/A";
      if (moduleVal !== "N/A" && !moduleVal.toLowerCase().includes("module")) {
        moduleVal += " Module";
      }

      const loggedInUser = localStorage.getItem("username") || t.assigned_to_name || "N/A";
      const environmentStr = (t.environment || "BETA").toUpperCase();

      let textContent = "";
      textContent += `Ticket No      : ${t.ticket_code}\n`;
      textContent += `Module         : ${moduleVal}\n`;
      textContent += `Issue          : ${t.short_name || t.issue_short || "N/A"}\n`;
      textContent += `Developer      : ${loggedInUser}\n`;
      textContent += `Reviewed By    : Sachin\n`;
      textContent += `Approved By    : Uma\n`;
      textContent += `Environment    : ${environmentStr}\n`;
      textContent += `Execution Date : ${execDateStr}\n`;

      textContent += `\nIssue Description:\n-----------------\n${t.issue_desc || "No description provided."}\n`;

      if (t.sql_script) {
        textContent += `\nDML Script:\n-----------------\n${t.sql_script}\n`;
      }

      if (t.root_cause) {
        textContent += `\nRoot Cause:\n-----------------\n${t.root_cause}\n`;
      }
      if (t.solution) {
        textContent += `\nSolution:\n-----------------\n${t.solution}\n`;
      }
      if (t.db_changes) {
        textContent += `\nDatabase Changes:\n-----------------\n${t.db_changes}\n`;
      }
      if (t.code_changes) {
        textContent += `\nCode Changes:\n-----------------\n${t.code_changes}\n`;
      }

      const blob = new Blob([textContent], { type: "text/plain;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);

      let codeName = t.ticket_code || "Ticket";
      let dateVal = execDateStr !== "N/A" ? execDateStr : (t.reported_date || "");

      // Extract the 2-letter uppercase abbreviation for the module chosen, e.g. "Sales" -> "SM"
      let moduleName = "";
      if (t.module_name && t.module_name !== "N/A") {
        const nicknames = {
          "Finance": "FM",
          "Procurement": "PM",
          "Claim": "CM",
          "Sales": "SM",
          "Tank Master": "TM",
          "Tank Inspection": "TI"
        };
        // Clean prefix/suffix if present
        let cleanName = t.module_name.replace(/^[A-Z]{2}\s*-\s*/i, '').replace(/\s*module$/i, '').trim();
        if (nicknames[cleanName]) {
          moduleName = nicknames[cleanName];
        } else {
          // Dynamic fallback for any new modules (e.g., "Asset Management" -> "AM")
          const words = cleanName.split(/\s+/);
          if (words.length >= 2) {
            moduleName = (words[0].charAt(0) + words[1].charAt(0)).toUpperCase();
          } else {
            moduleName = (cleanName.substring(0, 2) + "M").substring(0, 2).toUpperCase();
          }
        }
      }

      let shortName = t.short_name || t.issue_short || "";

      if (dateVal) dateVal = dateVal.replace(/-/g, '');

      let filename = t.ticket_code || "TKT";
      if (dateVal) filename += `-${dateVal}`;
      if (moduleName) filename += `_${moduleName}`;
      if (shortName) filename += `_${shortName}`;

      filename = filename.replace(/[/\\?%*:|"<> ,]/g, '_').trim();
      filename = filename.replace(/_+/g, '_');
      filename = filename.replace(/_+$/, '');
      if (!filename || filename === "_") filename = "ticket_details";

      link.download = `${filename}.TXT`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function renderTable(data) {
      if (!data || data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="15" style="text-align:center; color:#888; padding:20px;">No tickets found.</td></tr>`;
        return;
      }
      const rows = [];
      data.forEach((t, i) => {
        try {
          let actionsCell = "";
          if (isAdminOrHelpdesk) {
            const printBtn = (t.status === "Closed")
              ? `<i class="fa fa-print" title="Print IR" onclick="printTicket('${t.ticket_code}')"></i>`
              : "";
            const downloadBtn = `<i class="fa fa-download" title="Download Ticket Info" style="color:#2c7be5;" onclick="downloadTicketAsText('${t.ticket_code}')"></i>`;
            actionsCell = `<td class="actions">
              <i class="fa fa-pen edit" onclick="openManageMode('${t.ticket_code}')"></i>
              ${downloadBtn}
              ${printBtn}
              <i class="fa fa-times delete" onclick="deleteTicket('${t.ticket_code}')"></i>
            </td>`;
          }
          const statusColor = (t.status === "Closed") ? "#e63946" : "#28a745";
          const totalTimeSpent = (t.status === "Closed")
            ? (t.total_time_spent || calculateTotalSpent(t.created_at, t.updated_at))
            : calculateTotalSpent(t.created_at);
          rows.push(`<tr>
            <td><span class="ticket-link" onclick="openManageMode('${t.ticket_code}')">${t.ticket_code || "-"}</span></td>
            <td>${t.cif_no || "-"}</td>
            <td>${t.reported_date || "-"}</td>
            <td>${t.priority || "-"}</td>
            <td>${t.severity || "-"}</td>
            <td>${t.affected_user || "-"}</td>
            <td>${t.issue_short || "-"}</td>
            <td>${t.screen || "-"}</td>
            <td>${t.reported_user_name || "-"}</td>
            <td>${t.assigned_to_name || "-"}</td>
            <td>${t.reported_person || "-"}</td>
            <td style="color:${statusColor}; font-weight:600">${t.status || "Open"}</td>
            <td>${t.actual_time_spent || "-"}</td>
            <td>${totalTimeSpent}</td>
            ${actionsCell}
          </tr>`);
        } catch (rowErr) {
          console.error("Row render error at index", i, rowErr);
          rows.push(`<tr><td colspan="15" style="color:red; font-size:12px; padding:4px 12px;">Row ${i} (${t.ticket_code}) error: ${rowErr.message}</td></tr>`);
        }
      });
      tbody.innerHTML = rows.join("");
    }
    function filterTable() {
      const term = document.getElementById("searchBox").value.toLowerCase();
      const filtered = tickets.filter(t => Object.values(t).some(val => String(val).toLowerCase().includes(term)));
      renderTable(filtered);
    }


  </script>
